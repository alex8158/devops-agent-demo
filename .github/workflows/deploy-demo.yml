name: Deploy DevOps Agent Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest

    env:
      STACK_NAME: devops-agent-demo-stack
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file infra/lambda-error-demo.yaml \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Show stack info
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME"

      - name: Trigger demo error
        run: |
          aws lambda invoke \
            --function-name devops-agent-demo-lambda \
            --payload '{"source":"github-actions","purpose":"devops-agent-demo"}' \
            response.json || true
          cat response.json || true
